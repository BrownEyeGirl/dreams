 <script>
  const fadeOverlay=document.getElementById("fade"); 



  document.addEventListener("keydown", (event) => {

  if (event.code === "Space") {
    window.location.href = "scene5.html";
  }

}); 


// music 
let playing = false; 


function playMelody() {

  
 // synth 

  const reverb = new Tone.Reverb({
    decay: 4,
    wet: 0.6
  }).toDestination();

  const panner = new Tone.Panner3D({
    positionX: 0,
    positionY: 0,
    positionZ: 0
  }).connect(reverb);

  const synth = new Tone.Synth({
    oscillator: { type: "sawtooth" },
    envelope: {
      attack: 0.5,
      decay: 0.5,
      sustain: 0.15,
      release: 1
    }
  }).connect(panner);

  const notes = ["C4", "E4", "G4", "A4", "C5"];

  const loop = new Tone.Loop((time) => {
    const note = notes[Math.floor(Math.random() * notes.length)];
    synth.triggerAttackRelease(note, "1n", time);
  }, "1m");

  loop.start(0);

  Tone.Transport.start();
}

document.addEventListener("click", async () => {
  
    await Tone.start();
      playMelody();
      setTimeout(() => {
        playMelody();
      }, 150)
  
});




 </script>
</script>
